name: Windows streaming smoke

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.102
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: true
          include-templates: false
      - run: godot --headless --rendering-method gl_compatibility --path . --editor --quit
      - run: godot --headless --rendering-method gl_compatibility --path . -- --smoke-test --stress-driver
