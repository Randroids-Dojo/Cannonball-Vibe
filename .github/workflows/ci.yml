name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    name: Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.102
      - run: dotnet test Cannonball.sln

  map-pipeline:
    name: Public-domain map pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.24"
          enable-cache: true
      - run: uv sync --project tools/map_pipeline --locked
      - run: uv run --project tools/map_pipeline ruff check tools/map_pipeline
      - run: uv run --project tools/map_pipeline pytest

  godot-smoke:
    name: Godot 4.7.1 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.102
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.1
          use-dotnet: true
          include-templates: false
      - run: godot --headless --rendering-method gl_compatibility --path . --editor --quit
      - run: GODOT_BIN="$(command -v godot)" ./scripts/run-scenario.sh --smoke-test
