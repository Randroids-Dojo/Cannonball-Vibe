name: Deterministic assets

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: assets-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-assets:
    name: Blender and Godot asset pipeline
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DOTNET_ROLL_FORWARD: Major
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          lfs: true
          persist-credentials: false
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.102
      - uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: 4.7.1
          use-dotnet: true
          include-templates: true
      - name: Install headless rendering runtime
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libegl1
      - name: Install pinned Blender
        shell: bash
        run: |
          url="$(node -p 'require("./tools/assets/toolchain.json").blender.linux_x64_url')"
          expected="$(node -p 'require("./tools/assets/toolchain.json").blender.linux_x64_sha256')"
          archive="$RUNNER_TEMP/blender.tar.xz"
          curl --fail --location --retry 3 --output "$archive" "$url"
          echo "$expected  $archive" | sha256sum --check --strict
          tar -xJf "$archive" -C "$RUNNER_TEMP"
          echo "BLENDER_BIN=$RUNNER_TEMP/blender-5.1.2-linux-x64/blender" >> "$GITHUB_ENV"
      - name: Validate deterministic asset pipeline
        shell: bash
        run: ./scripts/validate-assets.sh
      - name: Upload asset evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: p1-002-assets-${{ github.run_attempt }}
          path: reports/assets/
          if-no-files-found: error
          retention-days: 14
